<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0077be">
    <meta name="description" content="PWA לבדיקות איכות מים - הרי נצרת">
    <title>בדיקות איכות מים</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230077be' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>💧</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0077be;
            --secondary: #00b4d8;
            --success: #06a77d;
            --danger: #d62828;
            --warning: #f77f00;
            --light: #f0f0f0;
            --dark: #333;
            --border: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            text-align: right;
            direction: rtl;
            transition: border-color 0.3s;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            text-align: right;
            direction: rtl;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 119, 190, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #005fa3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 119, 190, 0.3);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #b01f1f;
        }

        .records-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            background: var(--light);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-right: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info {
            text-align: right;
            flex: 1;
        }

        .record-info strong {
            display: block;
            color: var(--primary);
            margin-bottom: 3px;
        }

        .record-info small {
            color: #666;
            font-size: 12px;
        }

        .record-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view {
            background: var(--secondary);
            color: white;
        }

        .btn-view:hover {
            background: #0099c5;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-delete:hover {
            background: #b01f1f;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-good {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-warning {
            background: #fff9c4;
            color: #f57f17;
        }

        .status-bad {
            background: #ffcdd2;
            color: #c62828;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            background: var(--light);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #c8e6c9;
            color: #2e7d32;
            border-right: 4px solid #2e7d32;
        }

        .alert-error {
            background: #ffcdd2;
            color: #c62828;
            border-right: 4px solid #c62828;
        }

        .offline-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 15px;
            background: var(--warning);
            color: white;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            z-index: 1000;
        }

        .offline-badge.show {
            display: block;
        }

        .install-banner {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: right;
        }

        .install-banner.show {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .install-banner button {
            background: white;
            color: var(--primary);
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="installBanner" class="install-banner"></div>

        <header>
            <h1>💧 בדיקות איכות מים</h1>
            <p>הרי נצרת מפעלי מים וביוב בע"מ</p>
        </header>

        <div id="alert" class="alert"></div>

        <div class="main-grid">
            <!-- טופס קלט -->
            <div class="card">
                <h2>📝 הוסף בדיקה חדשה</h2>
                
                <form id="testForm">
                    <div class="form-group">
                        <label for="locality">ישוב *</label>
                        <select id="locality" required>
                            <option value="">בחר ישוב</option>
                            <option value="נצרת">נצרת</option>
                            <option value="ריינה">ריינה</option>
                            <option value="יפיע">יפיע</option>
                            <option value="עילוט">עילוט</option>
                            <option value="איכסאל">איכסאל</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="meter">מספר מד מים / עמדה *</label>
                        <input type="text" id="meter" placeholder="לדוגמא: מד-001 או עמדה A" required>
                    </div>

                    <div class="form-group">
                        <label for="turbidity">עכירות (NTU) *</label>
                        <input type="number" id="turbidity" step="0.01" placeholder="0.00" required>
                    </div>

                    <div class="form-group">
                        <label for="chlorine">כלור נותר (mg/L) *</label>
                        <input type="number" id="chlorine" step="0.01" placeholder="0.00" required>
                    </div>

                    <div class="form-group">
                        <label for="pH">pH *</label>
                        <input type="number" id="pH" step="0.01" placeholder="7.0" min="0" max="14" required>
                    </div>

                    <div class="form-group">
                        <label for="testTime">שעת הבדיקה *</label>
                        <input type="time" id="testTime" required>
                    </div>

                    <div class="form-group">
                        <label for="description">תיאור האירוע / הערות</label>
                        <textarea id="description" placeholder="לדוגמא: בדיקה בנקודת הפצה, טמפרטורה 25°C..." style="resize: vertical; min-height: 80px;"></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">💾 שמור בדיקה</button>
                        <button type="reset" class="btn-secondary">🔄 נקה</button>
                    </div>
                </form>
            </div>

            <!-- תיקיית בדיקות -->
            <div class="card">
                <h2>📊 סטטיסטיקה</h2>
                
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="totalTests">0</div>
                        <div class="stat-label">סה"כ בדיקות</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="todayTests">0</div>
                        <div class="stat-label">היום</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="localities">0</div>
                        <div class="stat-label">ישובים</div>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button class="btn-primary" onclick="exportAllPDF()" style="width: 100%; margin-bottom: 10px;">📄 דוח PDF כללי</button>
                    <button class="btn-primary" onclick="exportSelectedToWord()" style="width: 100%; margin-bottom: 10px; background: #06a77d;">📋 Export to Word</button>
                    <button class="btn-secondary" onclick="clearAllData()" style="width: 100%;">🗑️ מחק הכל</button>
                </div>
            </div>
        </div>

        <!-- רשימת בדיקות -->
        <div class="card">
            <h2>📋 בדיקות אחרונות</h2>
            <div id="recordsList" class="records-list"></div>
        </div>
    </div>

    <div id="offlineBadge" class="offline-badge">📡 עובד במצב אופליין</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        // ==================== IndexedDB Setup ====================
        let db;

        const dbConfig = {
            name: 'WaterQualityDB',
            version: 1,
            stores: {
                tests: { keyPath: 'id', indexes: [
                    { name: 'locality', unique: false },
                    { name: 'timestamp', unique: false },
                    { name: 'date', unique: false }
                ]}
            }
        };

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbConfig.name, dbConfig.version);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    if (!database.objectStoreNames.contains('tests')) {
                        const store = database.createObjectStore('tests', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('locality', 'locality', { unique: false });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                        store.createIndex('date', 'date', { unique: false });
                    }
                };
            });
        }

        function saveTest(testData) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['tests'], 'readwrite');
                const store = transaction.objectStore('tests');
                const request = store.add(testData);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
            });
        }

        function getTests() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['tests'], 'readonly');
                const store = transaction.objectStore('tests');
                const request = store.getAll();

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result.reverse());
            });
        }

        function deleteTest(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['tests'], 'readwrite');
                const store = transaction.objectStore('tests');
                const request = store.delete(id);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve();
            });
        }

        function clearAllTests() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['tests'], 'readwrite');
                const store = transaction.objectStore('tests');
                const request = store.clear();

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve();
            });
        }

        // ==================== Utilities ====================
        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        function formatDate(date) {
            return new Date(date).toLocaleString('he-IL', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getQualityStatus(turbidity, chlorine, pH) {
            let issues = [];
            
            if (turbidity > 1) issues.push('עכירות גבוהה');
            if (chlorine < 0.2 || chlorine > 1.0) issues.push('כלור בחוץ טווח');
            if (pH < 6.5 || pH > 8.5) issues.push('pH בחוץ טווח');

            if (issues.length === 0) return { status: 'good', badge: 'תקין', issues: [] };
            if (issues.length === 1) return { status: 'warning', badge: 'לתשומת לב', issues };
            return { status: 'bad', badge: 'בעיה', issues };
        }

        // ==================== Form Handling ====================
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const testData = {
                locality: document.getElementById('locality').value,
                meter: document.getElementById('meter').value,
                turbidity: parseFloat(document.getElementById('turbidity').value),
                chlorine: parseFloat(document.getElementById('chlorine').value),
                pH: parseFloat(document.getElementById('pH').value),
                testTime: document.getElementById('testTime').value,
                description: document.getElementById('description').value,
                timestamp: Date.now(),
                date: new Date().toISOString().split('T')[0]
            };

            try {
                await saveTest(testData);
                showAlert('✅ בדיקה נשמרה בהצלחה!');
                document.getElementById('testForm').reset();
                await loadRecords();
            } catch (error) {
                showAlert('❌ שגיאה בשמירה: ' + error.message, 'error');
            }
        });

        // ==================== Display Records ====================
        async function loadRecords() {
            try {
                const tests = await getTests();
                const list = document.getElementById('recordsList');

                if (tests.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">אין בדיקות עדיין</p>';
                } else {
                    list.innerHTML = tests.map(test => {
                        const quality = getQualityStatus(test.turbidity, test.chlorine, test.pH);
                        return `
                            <div class="record-item">
                                <div class="record-actions">
                                    <button class="btn-small btn-view" onclick="generateTestPDF(${test.id})">PDF</button>
                                    <button class="btn-small btn-delete" onclick="deleteRecord(${test.id})">מחק</button>
                                </div>
                                <div class="record-info">
                                    <strong>${test.locality} - ${test.meter} (${test.testTime})</strong>
                                    <small>${formatDate(test.timestamp)}</small><br>
                                    <small>עכירות: ${test.turbidity.toFixed(2)} | כלור: ${test.chlorine.toFixed(2)} | pH: ${test.pH.toFixed(2)}</small>
                                    ${test.description ? `<small>📝 ${test.description.substring(0, 50)}${test.description.length > 50 ? '...' : ''}</small><br>` : ''}
                                    <span class="status-badge status-${quality.status}">${quality.badge}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                updateStats(tests);
            } catch (error) {
                showAlert('❌ שגיאה בטעינה: ' + error.message, 'error');
            }
        }

        function updateStats(tests) {
            const today = new Date().toISOString().split('T')[0];
            const todayTests = tests.filter(t => t.date === today).length;
            const localities = new Set(tests.map(t => t.locality)).size;

            document.getElementById('totalTests').textContent = tests.length;
            document.getElementById('todayTests').textContent = todayTests;
            document.getElementById('localities').textContent = localities;
        }

        async function deleteRecord(id) {
            if (confirm('האם אתה בטוח שברצונך למחוק רשומה זו?')) {
                try {
                    await deleteTest(id);
                    showAlert('✅ בדיקה נמחקה');
                    await loadRecords();
                } catch (error) {
                    showAlert('❌ שגיאה: ' + error.message, 'error');
                }
            }
        }

        async function clearAllData() {
            if (confirm('⚠️ זה ימחוק את כל הנתונים! האם אתה בטוח?')) {
                try {
                    await clearAllTests();
                    showAlert('✅ כל הנתונים נמחקו');
                    await loadRecords();
                } catch (error) {
                    showAlert('❌ שגיאה: ' + error.message, 'error');
                }
            }
        }

        async function exportSelectedToWord() {
            try {
                const tests = await getTests();
                
                if (tests.length === 0) {
                    showAlert('❌ אין בדיקות לייצוא', 'error');
                    return;
                }

                // אם יש רק בדיקה אחת, יצא אותה
                if (tests.length === 1) {
                    exportTestAsJSON(tests[0]);
                    return;
                }

                // אחרת, שאל המשתמש איזה בדיקה
                const testIndex = prompt(`בחר בדיקה (1-${tests.length}):\n\n` + 
                    tests.map((t, i) => `${i+1}. ${t.locality} - ${t.meter} (${new Date(t.timestamp).toLocaleString('he-IL')})`).join('\n'));
                
                if (testIndex && !isNaN(testIndex)) {
                    const idx = parseInt(testIndex) - 1;
                    if (idx >= 0 && idx < tests.length) {
                        exportTestAsJSON(tests[idx]);
                    }
                }
            } catch (error) {
                showAlert('❌ שגיאה: ' + error.message, 'error');
            }
        }

        function exportTestAsJSON(test) {
            // צור JSON
            const json = JSON.stringify(test, null, 2);
            
            // צור blob
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            // יצור link להורדה
            const link = document.createElement('a');
            link.href = url;
            link.download = `בדיקה_${test.locality}_${test.date}_${test.testTime.replace(':', '-')}.json`;
            link.click();
            
            // נקה
            URL.revokeObjectURL(url);
            
            showAlert('✅ JSON הורד! עכשיו:\n1. התקן python-docx: pip install python-docx\n2. הרץ: python3 water_report_generator.py [json_file] [output_docx]', 'success');
        }

        // ==================== PDF Generation ====================
        async function generateTestPDF(testId) {
            try {
                const tests = await getTests();
                const test = tests.find(t => t.id === testId);
                
                if (!test) {
                    showAlert('❌ בדיקה לא נמצאה', 'error');
                    return;
                }

                const quality = getQualityStatus(test.turbidity, test.chlorine, test.pH);
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4',
                    compress: true
                });

                // כותרת
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(18);
                doc.text('דוח בדיקת איכות מים', 10, 20, { align: 'right' });

                // חברה
                doc.setFontSize(12);
                doc.setFont('helvetica', 'normal');
                doc.text('הרי נצרת מפעלי מים וביוב בע"מ', 10, 30, { align: 'right' });

                // תאריך
                doc.setFontSize(10);
                doc.text(`תאריך: ${formatDate(test.timestamp)}`, 10, 40, { align: 'right' });

                // פרטים
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(11);
                doc.text('פרטי הבדיקה:', 10, 55, { align: 'right' });

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);
                const details = [
                    `ישוב: ${test.locality}`,
                    `מד מים / עמדה: ${test.meter}`,
                    `שעת הבדיקה: ${test.testTime}`,
                    `עכירות (NTU): ${test.turbidity.toFixed(2)}`,
                    `כלור נותר (mg/L): ${test.chlorine.toFixed(2)}`,
                    `pH: ${test.pH.toFixed(2)}`,
                    `מצב: ${quality.badge}`
                ];

                let yPos = 65;
                details.forEach(detail => {
                    doc.text(detail, 10, yPos, { align: 'right' });
                    yPos += 8;
                });

                // תיאור האירוע
                if (test.description) {
                    yPos += 5;
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10);
                    doc.text('תיאור האירוע:', 10, yPos, { align: 'right' });
                    yPos += 8;
                    
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(9);
                    const lines = doc.splitTextToSize(test.description, 185);
                    lines.forEach(line => {
                        doc.text(line, 10, yPos, { align: 'right' });
                        yPos += 6;
                    });
                    yPos += 2;
                }

                // הערות איכות
                if (quality.issues.length > 0) {
                    yPos += 5;
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10);
                    doc.text('הערות:', 10, yPos, { align: 'right' });
                    yPos += 8;
                    
                    doc.setFont('helvetica', 'normal');
                    quality.issues.forEach(issue => {
                        doc.text(`⚠️ ${issue}`, 10, yPos, { align: 'right' });
                        yPos += 8;
                    });
                }

                // חתימה
                yPos += 10;
                doc.setLineWidth(0.5);
                doc.line(10, yPos, 50, yPos);
                yPos += 5;
                doc.setFontSize(9);
                doc.text('חתימת משביט', 10, yPos, { align: 'right' });

                // שמירה
                const filename = `בדיקה_${test.locality}_${new Date(test.timestamp).toISOString().split('T')[0]}.pdf`;
                doc.save(filename);
                showAlert('✅ PDF הורד בהצלחה');
            } catch (error) {
                showAlert('❌ שגיאה ביצירת PDF: ' + error.message, 'error');
            }
        }

        async function exportAllPDF() {
            try {
                const tests = await getTests();
                
                if (tests.length === 0) {
                    showAlert('❌ אין בדיקות להדפסה', 'error');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });

                // כותרת
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(18);
                doc.text('דוח כללי - בדיקות איכות מים', 10, 20, { align: 'right' });

                doc.setFontSize(12);
                doc.setFont('helvetica', 'normal');
                doc.text('הרי נצרת מפעלי מים וביוב בע"מ', 10, 30, { align: 'right' });
                doc.text(`דוח למ: ${new Date().toLocaleDateString('he-IL')}`, 10, 37, { align: 'right' });

                // טבלה
                doc.setFontSize(10);
                const tableData = tests.map(test => {
                    const quality = getQualityStatus(test.turbidity, test.chlorine, test.pH);
                    return [
                        new Date(test.timestamp).toLocaleDateString('he-IL'),
                        test.testTime || '-',
                        test.locality,
                        test.meter,
                        test.turbidity.toFixed(2),
                        test.chlorine.toFixed(2),
                        test.pH.toFixed(2),
                        quality.badge
                    ];
                });

                // ציור טבלה ידני (כי jsPDF-AutoTable עלול להיות בעיה)
                let yPos = 50;
                const colWidth = 22;
                const rowHeight = 8;
                const headers = ['תאריך', 'שעה', 'ישוב', 'מד מים', 'עכירות', 'כלור', 'pH', 'מצב'];

                // Headers
                doc.setFont('helvetica', 'bold');
                doc.setFillColor(0, 119, 190);
                doc.setTextColor(255, 255, 255);
                
                headers.forEach((header, i) => {
                    const x = 200 - (i * colWidth);
                    doc.rect(x - colWidth, yPos, colWidth, rowHeight, 'F');
                    doc.text(header, x - 2, yPos + 6, { align: 'right' });
                });

                yPos += rowHeight;
                doc.setTextColor(0, 0, 0);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);

                // Rows
                tableData.forEach((row, rowIndex) => {
                    if (yPos > 250) {
                        doc.addPage();
                        yPos = 20;
                    }

                    row.forEach((cell, i) => {
                        const x = 200 - (i * colWidth);
                        doc.rect(x - colWidth, yPos, colWidth, rowHeight);
                        doc.text(String(cell), x - 2, yPos + 6, { align: 'right' });
                    });

                    yPos += rowHeight;
                });

                doc.save(`דוח_איכות_מים_${new Date().toISOString().split('T')[0]}.pdf`);
                showAlert('✅ דוח הורד בהצלחה');
            } catch (error) {
                showAlert('❌ שגיאה: ' + error.message, 'error');
            }
        }

        // ==================== Service Worker ====================
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            }
        }

        // ==================== Offline Detection ====================
        window.addEventListener('online', () => {
            document.getElementById('offlineBadge').classList.remove('show');
        });

        window.addEventListener('offline', () => {
            document.getElementById('offlineBadge').classList.add('show');
        });

        // ==================== PWA Install Banner ====================
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
            document.getElementById('installBanner').innerHTML = `
                <span>💾 הוסף יישום לעמודת ההשראה שלך</span>
                <button class="btn-primary" onclick="installApp()">הוסף</button>
            `;
        });

        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            document.getElementById('installBanner').classList.remove('show');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choiceResult => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                });
            }
        }

        // ==================== Init ====================
        async function init() {
            await initDB();
            await loadRecords();
            registerServiceWorker();
        }

        init();
    </script>
</body>
</html>
