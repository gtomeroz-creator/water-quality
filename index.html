<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0077be">
    <meta name="description" content="PWA לבדיקות איכות מים - הרי נצרת">
    <title>בדיקות איכות מים</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230077be' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>💧</text></svg>">
    
    <!-- ספריות חיצוניות ליצירת Word -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0077be;
            --secondary: #00b4d8;
            --success: #06a77d;
            --danger: #d62828;
            --warning: #f77f00;
            --light: #f0f0f0;
            --dark: #333;
            --border: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
            text-align: right;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            text-align: right;
            direction: rtl;
            transition: all 0.3s;
        }

        input.field-warning {
            border-color: var(--danger);
            background: #fff5f5;
            box-shadow: 0 0 0 3px rgba(214, 40, 40, 0.1);
        }

        .field-alert {
            display: none;
            margin-top: 6px;
            padding: 8px 12px;
            background: #fff3cd;
            border-right: 4px solid var(--danger);
            border-radius: 4px;
            color: var(--danger);
            font-size: 13px;
            font-weight: bold;
            text-align: right;
            animation: slideIn 0.3s ease-out;
        }

        .field-alert.show {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="file"] {
            padding: 8px;
            background: #f9f9f9;
        }

        .image-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .img-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            text-align: center;
        }

        .img-btn-camera {
            background: var(--primary);
            color: white;
        }

        .img-btn-camera:hover {
            background: #005fa3;
        }

        .img-btn-gallery {
            background: white;
            color: var(--primary);
        }

        .img-btn-gallery:hover {
            background: #e3f2fd;
        }

        .img-btn.selected {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .img-preview {
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .img-preview.show {
            display: block;
        }

        .img-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            border: 2px solid var(--success);
        }

        .img-preview .img-label {
            font-size: 12px;
            color: var(--success);
            font-weight: bold;
            margin-top: 5px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 119, 190, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #005fa3;
        }

        .btn-primary:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--light);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            white-space: pre-wrap;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #c8e6c9;
            color: #2e7d32;
            border-right: 4px solid #2e7d32;
        }

        .alert-error {
            background: #ffcdd2;
            color: #c62828;
            border-right: 4px solid #c62828;
        }

        .warnings {
            padding: 12px;
            border-radius: 6px;
            background: #fff3cd;
            border-right: 4px solid #ff9800;
            margin-bottom: 15px;
            display: none;
        }

        .warnings.show {
            display: block;
        }

        .warning-item {
            color: #d62828;
            font-weight: bold;
            margin: 4px 0;
        }

        .info-box {
            background: #e3f2fd;
            border-right: 4px solid #0077be;
            padding: 15px;
            border-radius: 6px;
            text-align: right;
        }

        .info-box ol {
            margin: 10px 0;
            padding-right: 20px;
        }

        .offline-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 15px;
            background: var(--warning);
            color: white;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            z-index: 1000;
        }

        .offline-badge.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💧 בדיקות איכות מים</h1>
            <p>הרי נצרת מפעלי מים וביוב בע"מ</p>
        </header>

        <div id="alert" class="alert"></div>

        <!-- הוראות -->
        <div class="card">
            <h2>ℹ️ הוראות שימוש</h2>
            <div class="info-box">
                <strong>🔄 זרימת עבודה:</strong>
                <ol>
                    <li>מלא את כל השדות החובה (*)</li>
                    <li>צרף תמונה של בדיקת עכירות</li>
                    <li>צרף תמונה של בדיקת כלור</li>
                    <li>לחץ "📄 צור קובץ Word"</li>
                    <li>קובץ Word יורד אוטומטית עם התמונות!</li>
                </ol>
            </div>
        </div>

        <!-- טופס -->
        <div class="card">
            <h2>📝 הוסף בדיקה חדשה</h2>
            
            <form id="testForm">
                <div class="form-group">
                    <label for="locality">ישוב *</label>
                    <select id="locality" required>
                        <option value="">בחר ישוב</option>
                        <option value="נצרת">נצרת</option>
                        <option value="ריינה">ריינה</option>
                        <option value="יפיע">יפיע</option>
                        <option value="עילוט">עילוט</option>
                        <option value="איכסאל">איכסאל</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="meter">מספר מד מים / עמדה *</label>
                    <input type="text" id="meter" placeholder="לדוגמא: מד-001 או עמדה A" required>
                </div>

                <div class="form-group">
                    <label for="testDate">תאריך הבדיקה *</label>
                    <input type="date" id="testDate" required>
                </div>

                <div class="form-group">
                    <label for="testTime">שעת הבדיקה *</label>
                    <input type="time" id="testTime" required>
                </div>

                <div class="form-group">
                    <label for="waterSource">מקור הזנת המים</label>
                    <input type="text" id="waterSource" placeholder="לדוגמא: בריכת מים A, קו ראשי...">
                </div>

                <div class="form-group">
                    <label for="turbidity">עכירות (NTU) *</label>
                    <input type="number" id="turbidity" step="0.01" placeholder="0.00" required>
                    <div id="turbidity-alert" class="field-alert"></div>
                </div>

                <div class="form-group">
                    <label>📷 תמונת בדיקת עכירות *</label>
                    <div class="image-input-group">
                        <label class="img-btn img-btn-camera">
                            📸 צלם
                            <input type="file" id="turbidityCamera" accept="image/*" capture="environment" style="display:none;">
                        </label>
                        <label class="img-btn img-btn-gallery">
                            🖼️ גלריה
                            <input type="file" id="turbidityGallery" accept="image/*" style="display:none;">
                        </label>
                    </div>
                    <div id="turbidityPreview" class="img-preview"></div>
                </div>

                <div class="form-group">
                    <label for="chlorine">כלור נותר (mg/L) *</label>
                    <input type="number" id="chlorine" step="0.01" placeholder="0.00" required>
                    <div id="chlorine-alert" class="field-alert"></div>
                </div>

                <div class="form-group">
                    <label>📷 תמונת בדיקת כלור *</label>
                    <div class="image-input-group">
                        <label class="img-btn img-btn-camera">
                            📸 צלם
                            <input type="file" id="chlorineCamera" accept="image/*" capture="environment" style="display:none;">
                        </label>
                        <label class="img-btn img-btn-gallery">
                            🖼️ גלריה
                            <input type="file" id="chlorineGallery" accept="image/*" style="display:none;">
                        </label>
                    </div>
                    <div id="chlorinePreview" class="img-preview"></div>
                </div>

                <div class="form-group">
                    <label for="pH">pH</label>
                    <input type="number" id="pH" step="0.01" placeholder="7.0" min="0" max="14">
                    <div id="pH-alert" class="field-alert"></div>
                </div>

                <div class="form-group">
                    <label for="description">תיאור האירוע / הערות</label>
                    <textarea id="description" placeholder="לדוגמא: בדיקה בנקודת הפצה, טמפרטורה 25°C..."></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary" id="submitBtn">📄 צור קובץ Word</button>
                    <button type="reset" class="btn-secondary">🔄 נקה</button>
                </div>
            </form>
        </div>
    </div>

    <div id="offlineBadge" class="offline-badge">📡 עובד במצב אופליין</div>

    <script>
        // ==================== Utilities ====================
        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => alert.classList.remove('show'), 6000);
        }

        // המר תמונה ל-ArrayBuffer (עבור docx.js)
        function fileToArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // קבל מימדים של תמונה
        function getImageDimensions(file) {
            return new Promise((resolve) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    resolve({ width: img.naturalWidth, height: img.naturalHeight });
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    resolve({ width: 400, height: 300 });
                };
                img.src = url;
            });
        }

        // ==================== Image Handling ====================
        const selectedImages = {
            turbidity: null,
            chlorine: null
        };

        function setupImageInput(fieldName) {
            const cameraInput = document.getElementById(`${fieldName}Camera`);
            const galleryInput = document.getElementById(`${fieldName}Gallery`);
            const preview = document.getElementById(`${fieldName}Preview`);
            const cameraBtn = cameraInput.parentElement;
            const galleryBtn = galleryInput.parentElement;

            function handleFile(file, source) {
                if (!file) return;
                
                selectedImages[fieldName] = file;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `
                        <img src="${e.target.result}" alt="תצוגה מקדימה">
                        <div class="img-label">✅ תמונה נבחרה (${source})</div>
                    `;
                    preview.classList.add('show');
                };
                reader.readAsDataURL(file);

                cameraBtn.classList.remove('selected');
                galleryBtn.classList.remove('selected');
                if (source === 'מצלמה') {
                    cameraBtn.classList.add('selected');
                } else {
                    galleryBtn.classList.add('selected');
                }
            }

            cameraInput.addEventListener('change', (e) => handleFile(e.target.files[0], 'מצלמה'));
            galleryInput.addEventListener('change', (e) => handleFile(e.target.files[0], 'גלריה'));
        }

        setupImageInput('turbidity');
        setupImageInput('chlorine');

        // ==================== Validation בזמן אמת ====================
        function checkField(fieldId, value, min, max, fieldName, unit) {
            const input = document.getElementById(fieldId);
            const alertDiv = document.getElementById(fieldId + '-alert');
            
            if (value === '' || isNaN(value)) {
                input.classList.remove('field-warning');
                alertDiv.classList.remove('show');
                return true;
            }
            
            const num = parseFloat(value);
            let isOK = true;
            let message = '';
            
            if (min !== null && num < min) {
                isOK = false;
                message = `⚠️ ערך נמוך מהמותר - ${fieldName} חייב להיות לפחות ${min} ${unit}`;
            } else if (max !== null && num > max) {
                isOK = false;
                message = `⚠️ ערך גבוה מהמותר - ${fieldName} חייב להיות עד ${max} ${unit}`;
            }
            
            if (!isOK) {
                input.classList.add('field-warning');
                alertDiv.textContent = message;
                alertDiv.classList.add('show');
            } else {
                input.classList.remove('field-warning');
                alertDiv.classList.remove('show');
            }
            
            return isOK;
        }

        function validateForm() {
            const turbidityVal = document.getElementById('turbidity').value;
            const chlorineVal = document.getElementById('chlorine').value;
            const phVal = document.getElementById('pH').value;
            
            // עכירות: חייב להיות פחות מ-1 NTU
            checkField('turbidity', turbidityVal, null, 0.99, 'עכירות', 'NTU');
            
            // כלור: 0.1-0.5 mg/L
            checkField('chlorine', chlorineVal, 0.1, 0.5, 'כלור נותר', 'mg/L');
            
            // pH: 6.5-8.5
            checkField('pH', phVal, 6.5, 8.5, 'pH', '');
        }

        document.getElementById('turbidity').addEventListener('input', validateForm);
        document.getElementById('chlorine').addEventListener('input', validateForm);
        document.getElementById('pH').addEventListener('input', validateForm);

        document.getElementById('testDate').value = new Date().toISOString().split('T')[0];

        // ==================== Word Generation ====================
        async function generateWordDocument(data) {
            // נטען את כל הספריות הנדרשות
            const {
                Document, Packer, Paragraph, TextRun, ImageRun,
                AlignmentType, HeadingLevel, BorderStyle, Table, TableRow, TableCell,
                WidthType, ShadingType
            } = docx;

            // המר תמונות ל-ArrayBuffer
            const turbidityImg = await fileToArrayBuffer(selectedImages.turbidity);
            const turbidityDim = await getImageDimensions(selectedImages.turbidity);
            const chlorineImg = await fileToArrayBuffer(selectedImages.chlorine);
            const chlorineDim = await getImageDimensions(selectedImages.chlorine);

            // הגדרות
            const turbidityOK = data.turbidity < 1;
            const chlorineOK = data.chlorine >= 0.1 && data.chlorine <= 0.5;
            const phOK = data.pH === null || data.pH === '' || (data.pH >= 6.5 && data.pH <= 8.5);
            const allOK = turbidityOK && chlorineOK && phOK;

            // צבעים
            const COLOR_PRIMARY = "0077BE";
            const COLOR_DANGER = "D62828";
            const COLOR_SUCCESS = "06A77D";

            // פונקציה ליצירת פסקה עם RTL
            function rtlPara(text, options = {}) {
                return new Paragraph({
                    bidirectional: true,
                    alignment: options.align || AlignmentType.RIGHT,
                    spacing: { after: 100 },
                    children: [
                        new TextRun({
                            text: text,
                            rightToLeft: true,
                            bold: options.bold || false,
                            size: options.size || 22,
                            color: options.color,
                            font: "Arial"
                        })
                    ]
                });
            }

            // פונקציה ליצירת תא בטבלה
            function makeCell(text, options = {}) {
                return new TableCell({
                    children: [
                        new Paragraph({
                            bidirectional: true,
                            alignment: AlignmentType.RIGHT,
                            children: [
                                new TextRun({
                                    text: text,
                                    rightToLeft: true,
                                    bold: options.bold || false,
                                    size: 22,
                                    font: "Arial"
                                })
                            ]
                        })
                    ],
                    width: { size: options.width || 50, type: WidthType.PERCENTAGE },
                    shading: options.shading ? { fill: options.shading, type: ShadingType.CLEAR } : undefined
                });
            }

            // יצירת מימדים מותאמים לתמונה
            function getImageSize(dim) {
                const maxWidth = 400;
                const ratio = dim.height / dim.width;
                return {
                    width: maxWidth,
                    height: Math.round(maxWidth * ratio)
                };
            }

            const tImgSize = getImageSize(turbidityDim);
            const cImgSize = getImageSize(chlorineDim);

            // בנה את תוכן המסמך
            const children = [];

            // ====== כותרת ======
            children.push(new Paragraph({
                bidirectional: true,
                alignment: AlignmentType.CENTER,
                spacing: { after: 100 },
                children: [
                    new TextRun({
                        text: "דוח בדיקת איכות מים",
                        rightToLeft: true,
                        bold: true,
                        size: 40,
                        color: COLOR_PRIMARY,
                        font: "Arial"
                    })
                ]
            }));

            children.push(new Paragraph({
                bidirectional: true,
                alignment: AlignmentType.CENTER,
                spacing: { after: 300 },
                children: [
                    new TextRun({
                        text: 'הרי נצרת מפעלי מים וביוב בע"מ',
                        rightToLeft: true,
                        bold: true,
                        size: 28,
                        color: COLOR_PRIMARY,
                        font: "Arial"
                    })
                ]
            }));

            // ====== פרטים כלליים ======
            children.push(rtlPara("פרטים כלליים", { bold: true, size: 28, color: COLOR_PRIMARY }));

            const infoTable = new Table({
                rows: [
                    new TableRow({ children: [makeCell("ישוב", { bold: true, shading: "E3F2FD" }), makeCell(data.locality)] }),
                    new TableRow({ children: [makeCell("מספר מד מים / עמדה", { bold: true, shading: "E3F2FD" }), makeCell(data.meter)] }),
                    new TableRow({ children: [makeCell("תאריך הבדיקה", { bold: true, shading: "E3F2FD" }), makeCell(data.date)] }),
                    new TableRow({ children: [makeCell("שעת הבדיקה", { bold: true, shading: "E3F2FD" }), makeCell(data.testTime)] }),
                ],
                width: { size: 100, type: WidthType.PERCENTAGE },
                visuallyRightToLeft: true
            });

            children.push(infoTable);
            children.push(new Paragraph({ children: [], spacing: { after: 200 } }));

            // ====== מקור המים ======
            if (data.waterSource) {
                children.push(rtlPara("מקור הזנת המים", { bold: true, size: 28, color: COLOR_PRIMARY }));
                children.push(rtlPara(data.waterSource));
                children.push(new Paragraph({ children: [], spacing: { after: 200 } }));
            }

            // ====== עכירות ======
            children.push(rtlPara("בדיקת עכירות", { bold: true, size: 28, color: COLOR_PRIMARY }));
            
            children.push(new Paragraph({
                bidirectional: true,
                alignment: AlignmentType.RIGHT,
                children: [
                    new TextRun({
                        text: "ערך נמדד: ",
                        rightToLeft: true,
                        bold: true,
                        size: 24,
                        font: "Arial"
                    }),
                    new TextRun({
                        text: `${data.turbidity} NTU`,
                        rightToLeft: true,
                        bold: !turbidityOK,
                        size: 24,
                        color: turbidityOK ? undefined : COLOR_DANGER,
                        font: "Arial"
                    })
                ]
            }));

            if (!turbidityOK) {
                children.push(rtlPara("⚠️ שים לב: ערך חריג! עכירות גבוהה מ-1 NTU", { bold: true, color: COLOR_DANGER, size: 24 }));
            } else {
                children.push(rtlPara("✅ תקין", { color: COLOR_SUCCESS }));
            }

            // הוסף תמונת עכירות
            children.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { after: 200 },
                children: [
                    new ImageRun({
                        data: turbidityImg,
                        transformation: tImgSize
                    })
                ]
            }));

            // ====== כלור ======
            children.push(rtlPara("בדיקת כלור נותר", { bold: true, size: 28, color: COLOR_PRIMARY }));
            
            children.push(new Paragraph({
                bidirectional: true,
                alignment: AlignmentType.RIGHT,
                children: [
                    new TextRun({
                        text: "ערך נמדד: ",
                        rightToLeft: true,
                        bold: true,
                        size: 24,
                        font: "Arial"
                    }),
                    new TextRun({
                        text: `${data.chlorine} mg/L`,
                        rightToLeft: true,
                        bold: !chlorineOK,
                        size: 24,
                        color: chlorineOK ? undefined : COLOR_DANGER,
                        font: "Arial"
                    })
                ]
            }));

            if (!chlorineOK) {
                children.push(rtlPara("⚠️ שים לב: ערך חריג! כלור חייב להיות בין 0.1 ל-0.5 mg/L", { bold: true, color: COLOR_DANGER, size: 24 }));
            } else {
                children.push(rtlPara("✅ תקין", { color: COLOR_SUCCESS }));
            }

            // הוסף תמונת כלור
            children.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { after: 200 },
                children: [
                    new ImageRun({
                        data: chlorineImg,
                        transformation: cImgSize
                    })
                ]
            }));

            // ====== pH (אם הוזן) ======
            if (data.pH !== null && data.pH !== '') {
                children.push(rtlPara("בדיקת pH", { bold: true, size: 28, color: COLOR_PRIMARY }));
                
                children.push(new Paragraph({
                    bidirectional: true,
                    alignment: AlignmentType.RIGHT,
                    children: [
                        new TextRun({
                            text: "ערך נמדד: ",
                            rightToLeft: true,
                            bold: true,
                            size: 24,
                            font: "Arial"
                        }),
                        new TextRun({
                            text: `${data.pH}`,
                            rightToLeft: true,
                            bold: !phOK,
                            size: 24,
                            color: phOK ? undefined : COLOR_DANGER,
                            font: "Arial"
                        })
                    ]
                }));

                if (!phOK) {
                    children.push(rtlPara("⚠️ שים לב: ערך חריג! pH חייב להיות בין 6.5 ל-8.5", { bold: true, color: COLOR_DANGER, size: 24 }));
                } else {
                    children.push(rtlPara("✅ תקין", { color: COLOR_SUCCESS }));
                }
                children.push(new Paragraph({ children: [], spacing: { after: 200 } }));
            }

            // ====== תיאור האירוע ======
            if (data.description) {
                children.push(rtlPara("תיאור האירוע", { bold: true, size: 28, color: COLOR_PRIMARY }));
                children.push(rtlPara(data.description));
                children.push(new Paragraph({ children: [], spacing: { after: 200 } }));
            }

            // ====== סטטוס כללי ======
            children.push(rtlPara("סטטוס כללי", { bold: true, size: 28, color: COLOR_PRIMARY }));
            
            if (allOK) {
                children.push(rtlPara("✅ כל הבדיקות תקינות", { bold: true, size: 28, color: COLOR_SUCCESS }));
            } else {
                children.push(rtlPara("⚠️ נמצאו ערכים חריגים - נדרשת בדיקה נוספת", { bold: true, size: 28, color: COLOR_DANGER }));
            }

            // ====== חתימה ======
            children.push(new Paragraph({ children: [], spacing: { after: 600 } }));
            children.push(rtlPara("______________________________"));
            children.push(rtlPara("חתימת מבצע הבדיקה", { bold: true }));

            // צור את המסמך
            const doc = new Document({
                styles: {
                    default: {
                        document: {
                            run: { font: "Arial" }
                        }
                    }
                },
                sections: [{
                    properties: {
                        page: {
                            margin: { top: 1000, right: 1000, bottom: 1000, left: 1000 }
                        }
                    },
                    children: children
                }]
            });

            // ייצא ל-Blob והורד
            const blob = await Packer.toBlob(doc);
            const filename = `דוח_בדיקה_${data.locality}_${data.date}_${data.testTime.replace(':', '-')}.docx`;
            saveAs(blob, filename);
        }

        // ==================== Form Submission ====================
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');

            if (!selectedImages.turbidity) {
                showAlert('❌ חובה לצרף תמונת עכירות (צלם או בחר מגלריה)', 'error');
                return;
            }
            if (!selectedImages.chlorine) {
                showAlert('❌ חובה לצרף תמונת כלור (צלם או בחר מגלריה)', 'error');
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'יוצר Word... <span class="loading-spinner"></span>';
                showAlert('⏳ יוצר קובץ Word, נא להמתין...', 'success');

                const data = {
                    locality: document.getElementById('locality').value,
                    meter: document.getElementById('meter').value,
                    date: document.getElementById('testDate').value,
                    testTime: document.getElementById('testTime').value,
                    waterSource: document.getElementById('waterSource').value,
                    turbidity: parseFloat(document.getElementById('turbidity').value),
                    chlorine: parseFloat(document.getElementById('chlorine').value),
                    pH: document.getElementById('pH').value ? parseFloat(document.getElementById('pH').value) : null,
                    description: document.getElementById('description').value
                };

                await generateWordDocument(data);
                
                // איפוס הטופס
                document.getElementById('testForm').reset();
                document.getElementById('testDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('turbidityPreview').classList.remove('show');
                document.getElementById('chlorinePreview').classList.remove('show');
                selectedImages.turbidity = null;
                selectedImages.chlorine = null;
                document.querySelectorAll('.img-btn').forEach(b => b.classList.remove('selected'));
                document.querySelectorAll('.field-alert').forEach(a => a.classList.remove('show'));
                document.querySelectorAll('.field-warning').forEach(i => i.classList.remove('field-warning'));
                
                showAlert('✅ קובץ Word נוצר והורד בהצלחה!', 'success');
            } catch (error) {
                console.error('Error:', error);
                showAlert('❌ שגיאה ביצירת הקובץ: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '📄 צור קובץ Word';
            }
        });

        // ==================== Service Worker ====================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('SW registered');
                    setInterval(() => reg.update(), 30000);
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                if (confirm('🔄 גרסה חדשה זמינה! האם לטעון מחדש?')) {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                }
                            }
                        });
                    });
                })
                .catch(err => console.log('SW failed'));

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        }

        // ==================== Offline Detection ====================
        window.addEventListener('online', () => {
            document.getElementById('offlineBadge').classList.remove('show');
        });

        window.addEventListener('offline', () => {
            document.getElementById('offlineBadge').classList.add('show');
        });
    </script>
</body>
</html>
